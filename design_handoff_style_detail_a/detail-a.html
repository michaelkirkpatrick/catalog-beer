<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Juicy or Hazy IPA · Catalog.beer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
<link rel="stylesheet" href="catalog.css">
<link rel="stylesheet" href="styles-pages.css">
<style>
  /* Direction A — "Tasting Sheet" */
  .da-hero { position: relative; padding: 1.5rem 0 1.75rem; border-bottom: 2px solid var(--cb-ink); margin-bottom: 2rem; }
  .da-title { font-size: 4.2rem; line-height: 1.0; margin: 0; max-width: 14ch; }
  .da-sub { margin-top: 1rem; max-width: 34ch; }
  .da-glass { position: absolute; top: 1.5rem; right: 0; height: 188px; width: 112px; }
  .da-body { display: grid; grid-template-columns: 1fr 320px; gap: 3rem; align-items: start; }
  .da-rail { position: sticky; top: 1rem; display: flex; flex-direction: column; gap: 1.75rem;
    background: var(--cb-paper-2); border: 1px solid var(--cb-line); border-radius: .75rem; padding: 1.25rem 1.25rem 1.4rem; }
  .da-prose-h { font-family: var(--cb-serif); font-size: 1.6rem; color: var(--cb-ink); margin: 2.25rem 0 .75rem; }
  .da-prose-h:first-child { margin-top: 0; }
  @media (max-width: 860px){ .da-body{ grid-template-columns:1fr; } .da-title{ font-size:2.8rem; } .da-glass{ position:static; margin-top:1.25rem; } }
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg cb-nav" style="margin-bottom:0;">
  <div class="container-fluid">
    <a class="navbar-brand cb-wordmark" href="#">Catalog<span class="tld">.beer</span></a>
    <div class="navbar-nav ms-4 me-auto">
      <a class="nav-link" href="#">Brewers <span class="cb-count">6,595</span></a>
      <a class="nav-link" href="#">Beers <span class="cb-count">60,535</span></a>
      <a class="nav-link active" href="#">Styles <span class="cb-count">188</span></a>
      <a class="nav-link" href="#">Map</a>
    </div>
  </div>
</nav>

<div class="sp-page" style="padding-top:1.25rem;">
  <div class="sp-eyebrow"><a href="#">Styles</a> &nbsp;/&nbsp; <a href="#">Ale</a> &nbsp;/&nbsp; <a href="#">India Pale Ale</a></div>

  <header class="da-hero">
    <h1 class="sp-title da-title" id="t-name">—</h1>
    <p class="sp-lede da-sub" id="t-lede">—</p>
    <div class="da-glass sp-glass" id="t-glass">
      <div class="sp-foam"></div>
    </div>
  </header>

  <div class="da-body">
    <main class="sp-prose">
      <div id="t-desc"></div>

      <h2 class="da-prose-h">In the glass</h2>
      <div class="sp-aafm" id="t-aafm"></div>

      <h2 class="da-prose-h">Origin</h2>
      <div id="t-history"></div>

      <h2 class="da-prose-h">Beers in this style <span class="sp-count" id="t-beercount"></span></h2>
      <div class="sp-beers" id="t-beers"></div>

      <div style="margin-top:2rem;" class="sp-sources" id="t-sources"></div>
    </main>

    <aside class="da-rail">
      <div>
        <div class="sp-section-h" style="border:0;padding:0;margin-bottom:.7rem;">Color · SRM</div>
        <div class="sp-srm-range" id="t-srm"></div>
        <div class="sp-srm-legend d-flex justify-content-between" style="margin-top:.4rem;"><span id="t-srm-min"></span><span id="t-srm-max"></span></div>
      </div>
      <div>
        <div class="sp-section-h" style="border:0;padding:0;margin-bottom:.7rem;">Vital stats</div>
        <div class="sp-specs" id="t-specs"></div>
      </div>
    </aside>
  </div>
</div>

<div class="container-fluid cb-footer" style="padding:1.5em 0; margin-top:3em;">
  <div class="container"><span class="cb-wordmark" style="font-size:1rem;">Catalog<span class="tld">.beer</span></span>
  <span class="text-muted ms-3"><small>The Internet&#8217;s Beer Database</small></span></div>
</div>

<script src="srm.js"></script>
<script src="style-data.js"></script>
<script src="render-detail.js"></script>
<script>renderDetail('hazy-ipa');</script>
</body>
</html>
