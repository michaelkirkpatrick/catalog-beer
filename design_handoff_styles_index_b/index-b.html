<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Beer Styles · Catalog.beer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
<link rel="stylesheet" href="catalog.css">
<link rel="stylesheet" href="styles-pages.css">
<style>
  /* Index B — "Color cards": the SRM device as the organizing visual */
  .ix-head { padding: 2rem 0 1.5rem; margin-bottom: 1.5rem; }
  .ix-h1 { font-family: var(--cb-serif); font-size: 3.4rem; color: var(--cb-ink); margin: 0; line-height: 1; }
  .ix-sub { color: var(--cb-muted); margin-top: .6rem; max-width: 60ch; }
  .ix-class { margin-bottom: 2.5rem; }
  .ix-class-h { font-size: 1.5rem; margin: 0 0 1.1rem; }
  .ix-card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
  .ix-card { display: block; text-decoration: none; background: #fff; border: 1px solid var(--cb-line-2);
    border-radius: .7rem; padding: 1rem 1.1rem 1.1rem; transition: border-color .12s, box-shadow .12s; }
  .ix-card:hover { border-color: var(--pc); box-shadow: 0 .4rem 1rem rgba(27,26,23,.08); }
  .ix-card-top { display: flex; align-items: baseline; justify-content: space-between; }
  .ix-card-name { font-family: var(--cb-serif); font-size: 1.35rem; color: var(--cb-ink); }
  .ix-sw-row { display: flex; gap: 3px; margin: .8rem 0; }
  .ix-sw { flex: 1; height: 26px; border-radius: 3px; border: 1px solid rgba(27,26,23,.08); }
  .ix-card-styles { font-size: .82rem; color: var(--cb-muted); line-height: 1.5; }
  @media (max-width:860px){ .ix-card-grid{ grid-template-columns:repeat(2,1fr);} }
  @media (max-width:560px){ .ix-card-grid{ grid-template-columns:1fr;} .ix-h1{font-size:2.4rem;} }
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg cb-nav" style="margin-bottom:0;">
  <div class="container-fluid">
    <a class="navbar-brand cb-wordmark" href="#">Catalog<span class="tld">.beer</span></a>
    <div class="navbar-nav ms-4 me-auto">
      <a class="nav-link" href="#">Brewers <span class="cb-count">6,595</span></a>
      <a class="nav-link" href="#">Beers <span class="cb-count">60,535</span></a>
      <a class="nav-link active" href="#">Styles <span class="cb-count">188</span></a>
      <a class="nav-link" href="#">Map</a>
    </div>
  </div>
</nav>
<div class="sp-page">
  <header class="ix-head">
    <h1 class="ix-h1">Beer Styles</h1>
    <p class="ix-sub">Browse by family — each swatch row is the spread of color you'll find inside. 188 styles across 26 families, sorted by fermentation class.</p>
  </header>
  <div id="mount"></div>
</div>
<div class="container-fluid cb-footer" style="padding:1.5em 0; margin-top:3em;">
  <div class="container"><span class="cb-wordmark" style="font-size:1rem;">Catalog<span class="tld">.beer</span></span>
  <span class="text-muted ms-3"><small>The Internet&#8217;s Beer Database</small></span></div>
</div>
<script src="srm.js"></script>
<script src="style-data.js"></script>
<script src="render-index.js"></script>
<script>renderIndexCards('#mount');</script>
</body>
</html>
